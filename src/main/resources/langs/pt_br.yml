# Use %player_name% para substituir o nome do jogador
# Você precisa do PlaceHolderAPI para isso!

# Cores:
# &0 - Preto           | &8 - Cinza Escuro
# &1 - Azul Escuro     | &9 - Azul
# &2 - Verde Escuro    | &a - Verde
# &3 - Ciano Escuro    | &b - Ciano
# &4 - Vermelho Escuro | &c - Vermelho
# &5 - Roxo            | &d - Rosa
# &6 - Laranja         | &e - Amarelo
# &7 - Cinza           | &f - Branco

# Opções de Formatação:
# &k - Aleatório | &n - Sublinhado
# &l - Negrito   | &o - Itálico
# &m - Riscado   | &r - Resetar

# HEX para obter cor hexadecimal!
# Apenas em 1.16+
# HEX:#ffffff

# Placeholders

# %xg7lobby_warns%: retorna o número de advertências do jogador;
# %xg7lobby_chat_locked%: retorna se o chat está bloqueado;
# %xg7lobby_muted%: retorna se o jogador está silenciado;
# %xg7lobby_time_for_unmute%: retorna quando o jogador será dessilenciado;
# %xg7lobby_first_join%: retorna a primeira entrada do jogador no servidor;
# %xg7lobby_lobby_location%: retorna a localização do lobby;
# %xg7lobby_players_hide%: retorna se o jogador está ocultando outros jogadores.

# PLAYER retorna o jogador (se você não estiver usando PLACEHOLDER API)

# Coloque ACTION: no início para enviar mensagens na barra de ação!

join:

  join-message: "&8[&a+&8] &f%player_name% entrou no servidor."
  leave-message: "&8[&c-&8] &f%player_name% saiu do servidor."

  first-join-message: "&8[&f+&b1&8] &f%player_name% entrou no servidor pela primeira vez!"


commands:

  lobby-warn: "&cO lobby ainda não está disponível! Espere um administrador colocá-lo."
  adm-lobby-warn: "&cLobby não colocado! Envie &7/&esetlobby &cpare colocar!"

  # Mensagens de voo
  #[TARGET] = jogador alvo
  fly-enabled-other: "&aVocê habilitou o voo para &b[TARGET]!"
  fly-disabled-other: "&cVocê desabilitou o voo para &b[TARGET]!"
  fly-enabled: "&aSeu voo foi habilitado!"
  fly-disabled: "&cSeu voo foi desabilitado!"

  # Comando Build
  build-enabled: "&aSeu build foi habilitado"
  build-disabled: "&cSeu build foi desabilitado"
  build-warn: "&cSua build não está habilitado! Use &e/&bbuild &cpa habilitar!"

  # Mensagens do Modo de Jogo
  #[PLAYERG] = jogador alvo
  gamemode-player: "&7Seu modo de jogo foi alterado para &b[GAMEMODE]"
  gamemode-target: "&7Você alterou o modo de jogo de &b[TARGET] &7para &b[GAMEMODE]"

  # mensagens de Silenciamento
  when-muted: "&cVocê foi silenciado por um administrador! Por favor, não quebre as regras!"
  on-mute: "&cVocê não pode enviar mensagens. Você está silenciado!"
  on-mute-with-time: "&cVocê não pode enviar mensagens. Você está silenciado por [DAYS]"

  # Vanish
  on-hide: "[PREFIX] &aOs jogadores não estão mais visíveis no lobby"
  on-show: "[PREFIX] &cOs jogadores estão visíveis no lobby novamente!"

  # Aviso
  on-warn: "&cVocê foi avisado por: [WARN]"
  on-warn-remove: "&aSeu aviso: [WARN] foi removido!"

  on-lock-chat: "&cO chat foi bloqueado por um administrador!"


error-messages:

  no-permission: "[PREFIX] &cVocê não tem permissão para usar este comando!"
  missing-args: "[PREFIX] &cA maneira correta de usar o comando é: [COMMAND]"
  not-player: "[PREFIX] &cApenas jogadores podem executar este comando!"
  out-world: "[PREFIX] &cVocê não pode executar este comando em um mundo desativado!"
  player-doesnot-exist: "[PREFIX] &cEste jogador não existe!"
  player-not-online: "[PREFIX] &cEste jogador não está online!"
  erro-de-sintaxe: "[PREFIX] &cEste comando foi escrito incorretamente!"

events:

  # mensagens de sem permissão
  permission-drop: "&cVocê não tem permissão para dropar itens!"
  permission-pickup: "&cVocê não tem permissão para pegar itens!"
  permission-interact: "&cVocê não tem permissão para interagir com blocos!"
  permission-place: "&cVocê não tem permissão para colocar blocos!"
  permission-break: "&cVocê não tem permissão para quebrar blocos!"
  permission-attack: "&cVocê não tem permissão para atacar!"

  # mensagem de cooldown
  # Use SECONDS para retornar cooldown
  on-cooldown: "&cVocê deve esperar [SECONDS] segundos para usá-lo novamente."

  # mensagem de ocultar itens do jogador
  HD-hide: "&aVocê ocultou os jogadores!"
  HD-show: "&cVocê mostrou os jogadores novamente!"

  # mensagens do chat
  palavra-proibida: "&cVocê não pode digitar esta palavra no chat!"
  comando-bloqueado: "&cVocê não pode digitar este comando!"
  spam: "&cVocê está enviando mensagens muito rapidamente. Envie mais devagar."
  on-spam-mute: "&cVocê foi silenciado por spam por [TIME]"
  mensagem-cooldown: "&cVocê deve esperar [SECONDS] segundos para enviar outra mensagem!"
  mensagem-repetida: "&cVocê não pode enviar a mesma mensagem novamente!"
  mensagens-rápidas: "&cPor favor, envie as mensagens mais devagar!"
  chat-locked: "&cVocê não pode enviar mensagens porque o chat está bloqueado"

  # Teleporte do Lobby

  # Ou envie /lobby novamente para cancelar
  on-lobby-teleport: "&aVocê está sendo teleportado para o lobby em [SECONDS] segundos &a&l(Tipo /lobby novamente para cancelar o teleporte)!"
  lobby-cooldown-message: "[ACTION] &6Teleporting&7... &b[SECONDS] &cDon't move!"
  teleport-cancelled: "&cTeleport cancelled!"
