# Use %player_name% para substituir o nome do jogador
# Você precisa do PlaceHolderAPI para isso!

# Cores:
# &0 - Preto           | &8 - Cinza Escuro
# &1 - Azul Escuro     | &9 - Azul
# &2 - Verde Escuro    | &a - Verde
# &3 - Ciano Escuro    | &b - Ciano
# &4 - Vermelho Escuro | &c - Vermelho
# &5 - Roxo            | &d - Rosa
# &6 - Laranja         | &e - Amarelo
# &7 - Cinza           | &f - Branco

# Opções de Formatação:
# &k - Aleatório | &n - Sublinhado
# &l - Negrito   | &o - Itálico
# &m - Riscado   | &r - Resetar

# HEX para obter cor hexadecimal!
# Apenas em 1.16+
# HEX:#ffffff

# Placeholders

# %xg7lobby_warns%: retorna o número de advertências do jogador;
# %xg7lobby_chat_locked%: retorna se o chat está bloqueado;
# %xg7lobby_muted%: retorna se o jogador está silenciado;
# %xg7lobby_time_for_unmute%: retorna quando o jogador será dessilenciado;
# %xg7lobby_first_join%: retorna a primeira entrada do jogador no servidor;
# %xg7lobby_lobby_location%: retorna a localização do lobby;
# %xg7lobby_players_hide%: retorna se o jogador está ocultando outros jogadores.

# PLAYER retorna o jogador (se você não estiver usando PLACEHOLDER API)

# Coloque [ACTION] no início para enviar mensagens na barra de ação!

join:

  join-message: "&8[&a+&8] &f%player% entrou no servidor."
  leave-message: "&8[&c-&8] &f%player% saiu do servidor."

  first-join-message: "&8[&f+&b1&8] &f%player% entrou no servidor pela primeira vez!"


commands:

  lobby-warn: "&cO lobby ainda não está disponível! Aguarde um administrador colocá-lo."
  adm-lobby-warn: "&cLobby não definido! Envie &7/&esetlobby &cpara definir!"

  # Mensagens de voo
  #%target% = jogador alvo
  fly-enabled-other: "&aVocê habilitou o voo para &b%target%!"
  fly-disabled-other: "&cVocê desabilitou o voo para &b%target%!"
  fly-enabled: "&aSeu voo foi habilitado!"
  fly-disabled: "&cSeu voo foi desabilitado!"

  # Comando de Construir
  build-enabled: "&aSeu build foi ativado"
  build-disabled: "&Seu build foi desativado"
  build-warn: "&cSeu build não está ativado! Use &e/&bbuild &cpara ativar!"

  # Mensagens de Modo de Jogo
  # %target% = jogador alvo
  gamemode-player: "&7Seu modo de jogo foi alterado para &b%gamemode%"
  gamemode-target: "&7Você alterou o modo de jogo de &b%target% &7para &b%gamemode%"

  # Mensagens de Mudo
  when-muted: "&cVocê foi silenciado por um administrador! Por favor, não quebre as regras!"
  on-mute: "&cVocê não pode enviar mensagens. Você está silenciado!"
  on-mute-with-time: "&cVocê não pode enviar mensagens. Você está silenciado por %days%"

  # Desaparecer
  on-hide: "%prefix% &aOs jogadores não estão mais visíveis no lobby"
  on-show: "%prefix% &cOs jogadores estão visíveis no lobby novamente!"

  # Advertência
  on-warn: "&cVocê foi advertido por: %warn%"
  on-warn-remove: "&aSua advertência: %warn% foi removida!"

  on-lock-chat: "&cO chat foi bloqueado por um administrador!"

no-perm-messages:

  permission-command: "%prefix% &cVocê não tem permissão para usar este comando!"
  permission-drop: "%prefix% &cVocê não tem permissão para soltar itens!"
  permission-pickup: "%prefix% &cVocê não tem permissão para pegar itens!"
  permission-interact: "%prefix% &cVocê não tem permissão para interagir com blocos!"
  permission-place: "%prefix% &cVocê não tem permissão para colocar blocos!"
  permission-break: "%prefix% &cVocê não tem permissão para quebrar blocos!"
  permission-attack: "%prefix% &cVocê não tem permissão para atacar!"


error-messages:

  missing-args: "%prefix% &cA maneira correta de usar o comando é: %command%"
  not-player: "%prefix% &cApenas jogadores podem executar este comando!"
  out-world: "%prefix% &cVocê não pode executar este comando em um mundo desativado!"
  player-doesnot-exist: "%prefix% &cEste jogador não existe!"
  player-not-online: "%prefix% &cEste jogador não está online!"
  systax-error: "%prefix% &cEste comando foi escrito incorretamente!"

events:

  # Mensagem de Cooldown
  # Use %seconds% para retornar o tempo de espera
  on-cooldown: "&cVocê deve esperar %seconds% segundos para poder usá-lo novamente."

  # Mensagem de Ocultar Itens de Jogadores
  on-hide: "&aVocê ocultou os jogadores!"
  on-show: "&cVocê mostrou os jogadores novamente!"

  # Mensagens de Bate-Papo
  badword: "&cVocê não pode digitar essa palavra no bate-papo!"
  command-block: "&cVocê não pode digitar esse comando!"
  spam: "&cVocê está enviando mensagens muito rápido. Envie mais devagar."
  on-spam-mute: "&cVocê foi silenciado por spam por %time%"
  message-cooldown: "&cVocê deve esperar %seconds% segundos para enviar outra mensagem!"
  repeated-message: "&cVocê não pode enviar a mesma mensagem novamente!"
  quick-messages: "&cPor favor, envie as mensagens mais devagar!"
  chat-locked: "&cVocê não pode enviar mensagens porque o bate-papo está bloqueado"

  # Teleporte do Lobby

  # Ou envie /lobby novamente para cancelar
  on-lobby-teleport: "&aVocê está sendo teleportado para o lobby em %seconds% segundos &a&l(Digite /lobby novamente para cancelar o teleporte)!"
  lobby-cooldown-message: "[ACTION] &6Teleportando&7... &b%seconds% &cNão se mova!"
  teleport-cancelled: "&cTeleporte cancelado!"
