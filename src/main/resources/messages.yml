commands:
  syntax-error: "&cThe right way to use this command is: &r[SYNTAX]"
  no-permission: "&cYou don't have permission to use this!"
  not-a-player: "&cOnly players can execute this command!"
  not-in-world: "&cYou cannot execute this command in a disabled world!"

  player-doesnt-exist: "&cThis player doesn't exist!"


#Activate commands

pvp:
  not-enabled: "&cPVP is not enabled in this server! Go to config.yml to enable"

  on-enabling: "[ACTION] &aEnabling pvp in [SECONDS] seconds!"
  on-disabling: "[ACTION] &cDisabling pvp in [SECONDS] seconds... Don't move!"
  on-enabling-other: "&aEnabling pvp of [PLAYER] in [SECONDS] seconds..."
  on-disabling-other: "&cThe pvp of [PLAYER] is now disabled!"

  on-enable: "&aYour pvp is now enabled!"
  on-disable: "&cYour pvp is now disabled!"
  on-enable-other: "&aThe pvp of [PLAYER] is now enabled!"
  on-disable-other: "&cThe pvp of [PLAYER] is now disabled!"

  no-permission: "&cYou don't have permission to attack!"

  disabled-other: "&cYou cannot attack this player! This player has pvp disabled"
  disabled: "&cYou cannot attack! Your pvp is disabled"

  pvp-enable-cancelled: "[ACTION] &cPVP enable cancelled!"
  pvp-disable-cancelled: "[ACTION] &cPVP disable cancelled!"

vanish:
  on-enable: "&aYou toggle vanish to hide!"
  on-disable: "&cYou toggle vanish to show!"
  on-enable-other: "&aThe player [PLAYER] is now hiding other players!"
  on-disable-other: "&cThe build of [PLAYER] is now showing other players!"

build:
  on-enable: "&aYour build is now enabled!"
  on-disable: "&cYour build is now disabled!"
  on-enable-other: "&aThe build of [PLAYER] is now enabled!"
  on-disable-other: "&cThe build of [PLAYER] is now disabled!"

  disabled: "&cYour build is disabled, use &b/build &cto enable!"

fly:
  on-enable: "&aYour fly is now enabled!"
  on-disable: "&cYour fly is now disabled!"
  on-enable-other: "&aThe fly of [PLAYER] is now enabled!"
  on-disable-other: "&cThe fly of [PLAYER] is now disabled!"

  gamemode: "You must be in survival mode to toggle flight!"
  gamemode-other: "[PLAYER] must be in survival mode to toggle flight!"

  on-pvp: "&cYou cannot enable fly with pvp enabled"
  on-pvp-fly: "&cYou cannot enable pvp with fly enabled"

block-item-permission:
  no-permission-place: "&cYou don't have permission to place blocks!"
  no-permission-break: "&cYou don't have permission to break blocks!"
  no-permission-interact: "&cYou don't have permission to interact with blocks!"

  no-permission-pickup: "&cYou don't have permission to pickup items!"
  no-permission-drop: "&cYou don't have permission to drop items!"

lobby:
  no-location: "&cThe lobby was not placed, wait for an adm to put!"

  on-cmd: "You will teleport in few seconds, please wait!"
  on-tp: "[ACTION] &6You will teleport in [SECONDS] seconds... Don't move!"
  on-tp-cancel: "[ACTION] &cTeleport canceled"

  on-join: "&8[&a+&8] &f%player_name% joined the server."
  on-quit: "&8[&c-&8] &f%player_name% has left the server."
  on-first-join: "&8[&f+&b1&8] &f%player_name% joined the server for the first time"